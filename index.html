const VIEWS = {"pipeline": "<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Pipeline del Sistema Operativo · Vida en Arte</title>\n<style>\n  :root{\n    --g900:#004225; --g700:#1F5E3A; --g600:#355E3B; --g500:#4C6B47;\n    --grey:#E1E8E2; --flange:#EDF2EE; --ink:#13261c; --muted:#5f7167;\n    --bg:#F1F5F1; --bg2:#ffffff; --line:#dde7df;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;\n    background:radial-gradient(1200px 500px at 50% -10%, #ffffff 0%, var(--bg) 60%);\n    color:var(--ink);min-height:100vh;padding:26px 22px 60px}\n  .wrap{max-width:1120px;margin:0 auto}\n  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:6px}\n  .brand{display:flex;align-items:center;gap:18px}\n  .logo-chip{background:transparent;display:flex;align-items:center}\n  .logo-chip img{height:42px;display:block}\n  .eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:700}\n  .pagenav{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 4px}\n  .pagepill{font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;color:var(--g600);background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 18px;transition:.15s;white-space:nowrap}\n  .pagepill:hover{background:#eef3ee;transform:translateY(-1px)}\n  .pagepill.active{background:var(--g900);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,66,37,.18)}\n  h1{font-size:25px;font-weight:800;letter-spacing:.2px;margin-top:5px}\n  h1 span{color:var(--g600)}\n  .sub{font-size:13.5px;color:var(--muted);margin-top:4px;max-width:540px}\n  .flow-tag{font-size:12.5px;font-weight:700;color:var(--g900);background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 16px;display:flex;align-items:center;gap:9px;white-space:nowrap}\n  .flow-tag::before{content:\"\";width:9px;height:9px;border-radius:50%;background:var(--g900);box-shadow:0 0 0 4px rgba(0,66,37,.15)}\n\n  .stage{position:relative;margin-top:16px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:16px 14px 6px;box-shadow:0 14px 34px rgba(0,66,37,.06);overflow:hidden}\n  .pipe-svg{display:block;width:100%;height:auto}\n  .hint{text-align:center;font-size:12.5px;color:var(--muted);margin:4px 0 8px}\n  .hint kbd{background:#eef3ee;border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-family:inherit;font-size:11.5px;color:var(--ink);font-weight:600}\n  .seg{cursor:pointer}\n  .seg-label{cursor:pointer}\n  .seg-label.dim{opacity:.4}\n  .seg-label line, .seg-label circle{pointer-events:none}\n  /* compuertas (gates) = barras que giran */\n  .gate{cursor:pointer}\n  .gate .gate-bar{transition:transform .55s cubic-bezier(.5,-0.2,.3,1.3);transform-origin:0 0}\n  .gate:hover .bar-plate{filter:brightness(1.06)}\n  .gate:hover .gate-hub{stroke:#1f8a4c}\n  .gate .bar-plate{transition:fill .3s, stroke .3s}\n  /* intake dual valves */\n  .ivalve{cursor:pointer}\n  .ivalve .ihandle{transition:transform .4s cubic-bezier(.5,-0.2,.3,1.3);transform-origin:0 0}\n  .ivalve:hover circle:first-child{filter:brightness(1.05)}\n  #intake text{pointer-events:none}\n\n  .nav{display:flex;justify-content:center;gap:8px;margin:4px 0 2px;flex-wrap:wrap}\n  .nav button{font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 14px;transition:.15s;display:flex;align-items:center;gap:7px}\n  .nav button .nd{width:9px;height:9px;border-radius:50%}\n  .nav button[aria-current=\"true\"]{color:#fff;border-color:transparent}\n  .resetbtn{font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--g600);background:#fff;color:var(--g900);border-radius:999px;padding:8px 18px;transition:.15s}\n  .resetbtn:hover{background:var(--g900);color:#fff;border-color:var(--g900)}\n\n  .panel{margin-top:16px;border-radius:20px;overflow:hidden;border:1px solid var(--line);background:var(--bg2);box-shadow:0 14px 34px rgba(0,66,37,.06);display:grid;grid-template-columns:310px 1fr;min-height:280px}\n  .panel-side{padding:24px 24px;color:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden}\n  .panel-side .idx{font-size:13px;font-weight:700;letter-spacing:2px;opacity:.85}\n  .panel-side h2{font-size:23px;font-weight:800;margin-top:7px;line-height:1.12}\n  .panel-side .role{font-size:12.5px;opacity:.92;margin-top:8px;font-weight:600}\n  /* execution % block */\n  .exec{margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.22)}\n  .exec .lbl{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;opacity:.85}\n  .exec .big{font-size:54px;font-weight:800;line-height:1;margin-top:4px;letter-spacing:-1px}\n  .exec .unit{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}\n  .bar{height:8px;border-radius:99px;background:rgba(255,255,255,.22);margin-top:12px;overflow:hidden}\n  .bar > i{display:block;height:100%;border-radius:99px;background:#fff;transition:width .6s cubic-bezier(.4,0,.2,1)}\n  .count{margin-top:16px;font-size:12px;font-weight:700;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:7px 13px;display:inline-flex;align-items:center;gap:8px;width:fit-content}\n  /* flow gate control inside panel */\n  .flowctl{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.22)}\n  .flowctl .st{font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}\n  .flowctl .st .d{width:9px;height:9px;border-radius:50%}\n  .flowctl .st .d.red{background:#ff8f8f;box-shadow:0 0 0 4px rgba(255,143,143,.2)}\n  .flowctl .st .d.green{background:#7af2a8;box-shadow:0 0 0 4px rgba(122,242,168,.22)}\n  .relbtn{margin-top:10px;width:100%;font:inherit;font-size:13px;font-weight:800;cursor:pointer;border:none;border-radius:11px;padding:11px;transition:.15s;background:#fff;color:var(--g900);display:flex;align-items:center;justify-content:center;gap:8px}\n  .relbtn:hover{transform:translateY(-1px)}\n  .relbtn.close{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.55)}\n  .relbtn.close:hover{background:rgba(255,255,255,.26);transform:translateY(-1px)}\n\n  .panel-body{padding:22px 26px;display:flex;flex-direction:column}\n  .panel-body .lead{font-size:14px;color:var(--ink);line-height:1.55;margin-bottom:14px}\n  .filterbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}\n  .filterbar .flabel{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-right:2px}\n  .chipbtn{font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:6px 14px;transition:.15s}\n  .chipbtn:hover{background:#f1f5f1}\n  .chipbtn[aria-pressed=\"true\"]{background:var(--g600);color:#fff;border-color:transparent}\n  .deliv{display:flex;flex-direction:column;gap:8px;max-height:290px;overflow-y:auto;padding-right:4px}\n  .deliv-item{display:flex;align-items:flex-start;gap:11px;font-size:13.5px;color:var(--ink);background:#f3f7f3;border:1px solid var(--line);border-radius:10px;padding:10px 13px;line-height:1.4}\n  .deliv-item .tick{flex-shrink:0;width:18px;height:18px;border-radius:5px;display:grid;place-items:center;margin-top:1px}\n  .deliv-item .tick svg{width:11px;height:11px}\n  .un{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-left:auto;flex-shrink:0;align-self:center}\n  .un.veranito{background:#e3efe6;color:#2a6b42}\n  .un.kinder{background:#eae6f3;color:#5a4a8a}\n  .empty{font-size:13.5px;color:var(--muted);background:#f7faf7;border:1px dashed #bcccbe;border-radius:10px;padding:16px;text-align:center}\n  .stepper{display:flex;gap:10px;margin-top:16px}\n  .stepper button{font:inherit;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:9px 15px;transition:.15s}\n  .stepper button:hover:not(:disabled){background:#f1f5f1}\n  .stepper button:disabled{opacity:.4;cursor:not-allowed}\n  .stepper .spacer{flex:1}\n  footer{margin-top:24px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}\n  @media(max-width:760px){.panel{grid-template-columns:1fr}h1{font-size:21px}}\n  @media(prefers-reduced-motion:reduce){.flow-dot{display:none}}\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n\n  <header>\n    <div class=\"brand\">\n      <div class=\"logo-chip\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAPwAAAB4CAYAAADWip+pAABv0ElEQVR4nO1dd3wU1dp+3nNmdjeVJIRA6L2LQrBhSaLYFQvu2q89sffv2t1d29Vr12sh9opm7YqKoiSCNAlVQg+9JIT0srszc97vj9lAAgmEcilenh/DQjI7c+bMKW99XuAQDmH/ggDApTlw68dv3Hvi/11erp83VOHEzopO66dG3OFRt3/8ylvM3AkAvF6v2L/NPYRDOITdhtfrFcysZb3ifyv10mMZRycrnNiZkdGVkd6FcXRbK3bUIL7i+QfmMnNibm6uZGba3+0+hEM4hF1E2pgsnYhwz5fv3djhyhMYRyYG5Uk9GBnd7Amf0ZXFyT0Yx6YExdn9+ch7r7wbAJCeru3nph+0OCQeHcL+AhVk55hKKf3PP/Pv3bhkkZJxCbqlLAC85SRlWSBXtK4qKq3SDWtuX7hpU0dk5KtDu/zu4dBKeQj7EzwcBZi7aF40OV3CUopbOE3AsixLUpd38sf1gx/rPYMCEoC1T1v7N8ChCX8I+xUF2dlAZZkBIYCW5jsASImy2mr+YfFfYQAIBAL7qol/K/wtRXpmJk3IVp1LACT9LbvhoMDMMTOR3LF7NAwDRC1L6WRZSI1LoNuPO1kAgNvt3mdt/Dvhb7fDp2Vl6URkPPTR6/967rOX3fWVVSZINv+cbJnONm2040acNmbCfc8/m+HLkPn+fHMfN/mAADOL9tecOqlk+YL2JHTFzE1WQSICGyEV26mr6Dds5KUF9z05w53rlgFPYPfFaq9XpAHqiO59/pqwZvHxZO/x263UBLKUriEYMqZen376n1luyIDHc0ic3w38vbY2ZiooL1fMrH/2+w8nB+tqepGm9YOkXs0dQnf0C1Zs7lVTvPE+ADH5vjwL/9PGIOoHIXpBUJ9m+0xQH9JkL0iK3gs343RAEJF1yolnP9Sz9yCo2moAbNoH7E+CqWoqVIduPeVJJ5z2BBEF3Ti0u+8u/lYT3h0ICAQC1ucFk8+vra88kuvCJhgKips9lGUpQJoLVi5MvP7N5weDiN0ez9+qT3YNVAfFCsxms33GbMBUSgBqb9wt3+83vV6vuPfUUfnHH37cpX0PP4o0XdPIoWvQhEa6pumStD5px+p3nn/9mPey7v3Z6/VqgcAeSBX/4/hbifQ vertical tube that drops, curves right and merges into the main elbow -->\n      <path id=\"adsPipe\" fill=\"none\" stroke-linejoin=\"round\" stroke-linecap=\"round\"\n            d=\"M 55 -92 L 55 64 Q 55 110 101 110 L 200 110\"/>\n      <use href=\"#adsPipe\" stroke=\"#0a3a20\" stroke-width=\"64\"/>\n      <use href=\"#adsPipe\" stroke=\"url(#gPipe)\" stroke-width=\"56\"/>\n\n      <!-- prong mouths (top openings) -->\n      <ellipse cx=\"55\"  cy=\"-92\" rx=\"22\" ry=\"9\" fill=\"#072e19\"/>\n      <ellipse cx=\"150\" cy=\"-92\" rx=\"22\" ry=\"9\" fill=\"#072e19\"/>\n      <ellipse cx=\"360\" cy=\"500\" rx=\"22\" ry=\"9\" fill=\"#072e19\"/>\n\n      <!-- intake valves: one on each vertical prong -->\n      <g id=\"intake\">\n        <g class=\"ivalve\" data-src=\"ads\" transform=\"translate(55,-40)\"></g>\n        <g class=\"ivalve\" data-src=\"org\" transform=\"translate(150,-40)\"></g>\n        <text x=\"55\"  y=\"-138\" fill=\"#13261c\" font-size=\"14\" font-weight=\"700\" text-anchor=\"middle\">Ads</text>\n        <text x=\"150\" y=\"-138\" fill=\"#13261c\" font-size=\"14\" font-weight=\"700\" text-anchor=\"middle\">Orgánico</text>\n      </g>\n\n      <g id=\"hits\" fill=\"transparent\">\n        <path class=\"seg\" data-stage=\"0\" d=\"M120 8 H180 V78 H360 V142 H120 Z\"/>\n        <rect class=\"seg\" data-stage=\"1\" x=\"360\" y=\"78\" width=\"380\" height=\"64\"/>\n        <path class=\"seg\" data-stage=\"2\" d=\"M740 78 H772 Q872 110 872 220 Q872 362 760 362 H700 V298 Q808 298 808 220 Q808 142 740 142 Z\"/>\n        <rect class=\"seg\" data-stage=\"3\" x=\"392\" y=\"298\" width=\"320\" height=\"64\"/>\n        <path class=\"seg\" data-stage=\"4\" d=\"M328 298 H392 V362 H392 V470 H328 V362 Z\"/>\n      </g>\n\n      <g id=\"dots\"></g>\n      <g id=\"intakeDots\"></g>\n      <g id=\"gates\"></g>\n\n      <g font-family=\"Segoe UI, Arial, sans-serif\" font-weight=\"700\" font-size=\"14\">\n        <g class=\"seg-label\" data-stage=\"0\">\n          <line x1=\"261\" y1=\"76\" x2=\"261\" y2=\"48\" stroke=\"#bccabe\" stroke-width=\"1.4\"/>\n          <circle cx=\"261\" cy=\"110\" r=\"4.5\" fill=\"#004225\"/>\n          <text x=\"261\" y=\"42\" fill=\"#13261c\" text-anchor=\"middle\">Marketing</text>\n        </g>\n        <g class=\"seg-label\" data-stage=\"1\">\n          <line x1=\"568\" y1=\"76\" x2=\"568\" y2=\"48\" stroke=\"#bccabe\" stroke-width=\"1.4\"/>\n          <circle cx=\"568\" cy=\"110\" r=\"4.5\" fill=\"#355E3B\"/>\n          <text x=\"568\" y=\"42\" fill=\"#13261c\" text-anchor=\"middle\">Ventas</text>\n        </g>\n        <g class=\"seg-label\" data-stage=\"2\">\n          <line x1=\"810\" y1=\"238\" x2=\"760\" y2=\"238\" stroke=\"#bccabe\" stroke-width=\"1.4\"/>\n          <circle cx=\"830\" cy=\"238\" r=\"4.5\" fill=\"#4C6B47\"/>\n          <text x=\"752\" y=\"234\" fill=\"#13261c\" text-anchor=\"end\">Operaciones /</text>\n          <text x=\"752\" y=\"252\" fill=\"#13261c\" text-anchor=\"end\">Servicios</text>\n        </g>\n        <g class=\"seg-label\" data-stage=\"3\">\n          <line x1=\"574\" y1=\"364\" x2=\"574\" y2=\"392\" stroke=\"#bccabe\" stroke-width=\"1.4\"/>\n          <circle cx=\"574\" cy=\"330\" r=\"4.5\" fill=\"#2E7D5B\"/>\n          <text x=\"574\" y=\"408\" fill=\"#13261c\" text-anchor=\"middle\">Finanzas</text>\n        </g>\n        <g class=\"seg-label\" data-stage=\"4\">\n          <line x1=\"392\" y1=\"438\" x2=\"430\" y2=\"438\" stroke=\"#bccabe\" stroke-width=\"1.4\"/>\n          <circle cx=\"360\" cy=\"438\" r=\"4.5\" fill=\"#1F5E3A\"/>\n          <text x=\"436\" y=\"442\" fill=\"#13261c\">Ganancias</text>\n        </g>\n      </g>\n    </svg>\n\n    <div class=\"hint\">Toca un segmento para verlo · Gira una <b>compuerta</b> (la barra gris) para liberar el flujo atascado · Usa las llaves <b>Ads</b> y <b>Orgánico</b> para controlar la entrada de leads</div>\n    <div class=\"nav\" id=\"nav\"></div>\n    <div style=\"text-align:center;margin:10px 0 2px\">\n      <button id=\"resetBtn\" class=\"resetbtn\">&#8635; Cerrar todas las compuertas · reiniciar simulación</button>\n    </div>\n  </div>\n\n  <footer>Actio Growth · Pipeline operativo de Vida en Arte</footer>\n</div>\n\n<script>\nconst STAGES=[\n  {key:'mkt',idx:'ETAPA 01',name:'Marketing',color:'#004225',role:'Entrada del flujo · Atracción y captación',lead:'Aquí entra todo. Marketing alimenta la tubería con demanda: campañas, contenido y captación que generan prospectos para el resto del sistema.',deliv:[{n:'Configuración de WhatsApp En GHL',u:'Veranito'},{n:'Dashboard de Métricas Marketing',u:'Veranito'},{n:'Gestión con editora de ads - Valeria',u:'Veranito'},{n:'Loom para Valeria de edición',u:'Veranito'},{n:'Crear nueva oportunidad',u:'Kinder'},{n:'Estructura de testimonios',u:'Veranito'},{n:'Ajustar y enviar guiones de VSL y de ADS',u:'Veranito'},{n:'Configuración de Meta Bussines para poder subir campañas',u:'Veranito'},{n:'Gestión para diseño con Angie para presentación de leads kinder',u:'Kinder'},{n:'Supervisión de campaña actual y diseño de nueva campaña',u:'Veranito'},{n:'Estrategia de Marketing',u:'Veranito'}]},\n  {key:'sales',idx:'ETAPA 02',name:'Ventas',color:'#355E3B',role:'Calificación, contacto y cierre',lead:'El prospecto avanza por el embudo comercial: se califica, se contacta, se presenta la oferta y se cierra. Aquí la demanda se vuelve compromiso.',deliv:[{n:'Gestión con Billcentrix para instalar pasarela de pago',u:'Veranito'},{n:'Creación de landig para Veranito',u:'Veranito'},{n:'Dashboard de Métricas Ventas',u:'Veranito'},{n:'Guia de mensajes de cierre para whatsapp',u:'Veranito'},{n:'Guia de objeciones para usar en cierre de ventas',u:'Kinder'},{n:'Presentación del nuevo servicio de kinder a madres lideres',u:'Kinder'},{n:'Creación del embudo de venta',u:'Veranito'},{n:'Implementación de pasarela de pago',u:'Veranito'},{n:'Definición del precio',u:'Kinder'},{n:'Definición de la matricula',u:'Kinder'},{n:'Presentación de Pitch de ventas',u:'Kinder'},{n:'Estructura de descuentos por referidos',u:'Kinder'},{n:'Creación pagína de compra Veranito',u:'Veranito'},{n:'Entrenamiento para comercial de ventas',u:'Veranito'}]},\n  {key:'opsserv',idx:'ETAPA 03',name:'Operaciones / Servicios',color:'#4C6B47',role:'Entrega, puesta en marcha y soporte',lead:'Lo vendido se ejecuta y se sostiene. Operaciones pone en marcha lo prometido y Servicios acompaña al cliente para que la promesa se cumpla y se mantenga.',deliv:[{n:'Construcción  de aplicación VeaKidsBook',u:'Kinder'},{n:'Desarrollo de arquitectura administrativa',u:'Veranito'},{n:'Preparación de stack técnologico para desarrollo de la aplicación',u:'Kinder'},{n:'Culminación de modelo academico',u:'Kinder'},{n:'Dearrollo de Sistema de Rotación interactivo',u:'Kinder'},{n:'Cliente ideal-a quien ayudamos',u:'Kinder'},{n:'Estructura de servicio',u:'Kinder'},{n:'Optimización de filtro para Plan Tardes Veranito',u:'Veranito'}]},\n  {key:'fin',idx:'ETAPA 04',name:'Finanzas',color:'#2E7D5B',role:'Control financiero y medición',lead:'Se mide y se ordena el dinero del sistema: cobros, cierres y métricas financieras que muestran la salud real de cada operación.',deliv:[{n:'Dashboard de Métricas Finanzas',u:'Veranito'},{n:'Presentación de Cierre de mayo veranito',u:'Veranito'}]},\n  {key:'gan',idx:'ETAPA 05',name:'Ganancias',color:'#1F5E3A',role:'Salida del flujo · Resultado del sistema',lead:'La salida de la tubería. Todo lo anterior se convierte en rentabilidad — el resultado que justifica cada etapa del sistema.',deliv:[]},\n];\n\n\n// execution % per business unit\nconst EXEC={Veranito:100, Kinder:65, Todos:null};\n\nconst dotsG=document.getElementById('dots');\nconst path=document.getElementById('mainpath');\nconst L=path.getTotalLength();\n\n/* ---- Flow with per-segment bottleneck + releasable gates ---- */\n/* 5 zones along the path (contiguous), one per segment */\nconst ZONES=[[0.00,0.20],[0.20,0.44],[0.44,0.66],[0.66,0.86],[0.86,1.00]];\nconst released=[false,false,false,false,false];  // gate open per segment\nconst CHOKE=0.70; // congested flow only fills 70% of each segment until released\n// where within each zone the gate sits (on a clear straight run), fraction 0..1 of zone\nconst GATEPOS=[0.90,0.5,0.5,0.5,0.71];\n\n// pipe half-width available for particles (stroke 56 -> radius ~28, keep margin)\nconst PIPE_R=24;\n\n// precompute normal at a given length fraction by sampling neighbors\nfunction pointAndNormal(t){\n  const l=t*L;\n  const p0=path.getPointAtLength(Math.max(0,l-1));\n  const p1=path.getPointAtLength(Math.min(L,l+1));\n  const dx=p1.x-p0.x, dy=p1.y-p0.y;\n  const len=Math.hypot(dx,dy)||1;\n  // normal (perpendicular)\n  return {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2, nx:-dy/len, ny:dx/len};\n}\nfunction zoneOf(t){\n  for(let i=0;i<ZONES.length;i++){ if(t>=ZONES[i][0] && t<ZONES[i][1]) return i; }\n  return ZONES.length-1;\n}\n\nconst N=130; // lots of activity\nconst particles=[];\nfor(let i=0;i<N;i++){\n  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');\n  const r=2.6+Math.random()*2.8;\n  c.setAttribute('r',r);\n  c.setAttribute('class','flow-dot');\n  dotsG.appendChild(c);\n  const evenLat=((i/N)*2-1);\n  // 70% of particles are \"retained\" -> they form the clog (only 30% circulates)\n  const held = (i % 10) < 7;            // 70% retained / atascado\n  const home = Math.floor(Math.random()*ZONES.length); // which segment retains it\n  particles.push({\n    el:c,\n    t:Math.random(),\n    v:0.7+Math.random()*0.6,\n    lat:Math.max(-1,Math.min(1, evenLat*0.55 + (Math.random()*2-1)*0.55)),\n    wob:Math.random()*Math.PI*2,\n    held, home,\n    clogJitter: Math.random(),          // personal offset within the clog\n    rel:0,                              // 0..1 release progress (animates when gate opens)\n    intakeSrc: (i%2===0)?'ads':'org',   // lead source feeding this particle (50/50)\n    vis:1,                              // source visibility (eases to 0 when valve closes)\n    op0:(held?0.9:0.55+Math.random()*0.35),\n    base: held ? '#7ec39a' : '#e3f5ea'\n  });\n}\nparticles.forEach(p=>{ p.el.setAttribute('fill',p.base); p.el.setAttribute('opacity',(p.held?0.92:0.55+Math.random()*0.35).toFixed(2)); });\n\nconst reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;\nlet last=performance.now();\nfunction frame(now){\n  const dt=Math.min(40, now-last); last=now;\n  const base=0.000034; // SLOWER overall so the flow is easy to follow\n  particles.forEach(p=>{\n    const z=zoneOf(p.t);\n    const [zs,ze]=ZONES[z];\n    const span=ze-zs;\n    const gatePos = zs + span*GATEPOS[z];   // the choke point of this segment\n\n    // animate release progress so opening a gate has a visible transition\n    const target = (p.held && p.home===z && !released[z]) ? 0 : 1;\n    p.rel += (target - p.rel) * Math.min(1, dt*0.004);\n\n    const clogging = p.held && p.home===z && p.rel < 0.96; // still part of the clog\n\n    if(clogging){\n      // DRIFT toward the gate and PACK there into a dense, slow, jittering jam.\n      const packDepth = 0.085*span;                 // jam extends back from the gate\n      const slot = gatePos - p.clogJitter*packDepth; // each particle a bit further back\n      // crawl toward its slot; near the slot it just breathes (never fully stops)\n      let nt = p.t + (slot - p.t)*0.08 + Math.sin(now*0.003 + p.wob)*0.00012;\n      if(nt < zs) nt = zs;\n      p.t = nt;\n    } else {\n      // free flow: everyone moves at base speed; released clog particles surge then settle\n      const boost = p.held ? (0.6 + p.rel*0.8) : 1;\n      p.t = (p.t + base*dt*p.v*boost) % 1;\n    }\n\n    const pn = pointAndNormal(p.t);\n    // CLOG packs tight across width and jitters (turbulent jam); free flow is looser\n    const spread = clogging ? (0.25 + p.clogJitter*0.7) : 0.9;\n    const wob = Math.sin(now*(clogging?0.006:0.0022) + p.wob)*(clogging?0.45:0.1);\n    const off = (p.lat*spread + wob) * PIPE_R;\n    // INTAKE: ease this source's visibility toward its valve state (closing fades it out)\n    const srcOpen = (typeof intakeOpen!=='undefined') ? (intakeOpen[p.intakeSrc]?1:0) : 1;\n    p.vis += (srcOpen - p.vis) * Math.min(1, dt*0.003);\n    let baseOp = p.held ? (0.55 + (1-p.rel)*0.4) : p.op0;\n    p.el.setAttribute('opacity', (baseOp * p.vis).toFixed(3));\n    p.el.setAttribute('cx', pn.x + pn.nx*off);\n    p.el.setAttribute('cy', pn.y + pn.ny*off);\n  });\n  requestAnimationFrame(frame);\n}\nif(!reduce) requestAnimationFrame(frame);\nelse particles.forEach(p=>{const pn=pointAndNormal(p.t);p.el.setAttribute('cx',pn.x+pn.nx*p.lat*PIPE_R);p.el.setAttribute('cy',pn.y+pn.ny*p.lat*PIPE_R);});\n\n/* ---- COMPUERTAS (gates): grey BAR across the pipe that ROTATES to release ---- */\nconst gatesG=document.getElementById('gates');\nconst gateEls=[];\nfunction gateBarSVG(){\n  // a butterfly-valve style bar that spans the pipe width, with a small hub + bolts\n  return `\n    <g class=\"gate-bar\">\n      <rect class=\"bar-plate\" x=\"-7\" y=\"-27\" width=\"14\" height=\"54\" rx=\"5\" fill=\"url(#gFlange)\" stroke=\"#7f9485\" stroke-width=\"1.5\"/>\n      <circle cx=\"0\" cy=\"-19\" r=\"2.4\" fill=\"#8a9d8f\"/>\n      <circle cx=\"0\" cy=\"0\"   r=\"2.4\" fill=\"#8a9d8f\"/>\n      <circle cx=\"0\" cy=\"19\"  r=\"2.4\" fill=\"#8a9d8f\"/>\n    </g>\n    <circle class=\"gate-hub\" cx=\"0\" cy=\"0\" r=\"6.5\" fill=\"#fff\" stroke=\"#0a3a20\" stroke-width=\"2\"/>\n    <circle class=\"gate-hub-dot\" cx=\"0\" cy=\"0\" r=\"2\" fill=\"#0a3a20\"/>`;\n}\nfunction buildGates(){\n  ZONES.forEach((z,i)=>{\n    const [zs,ze]=z;\n    const gatePos=zs+(ze-zs)*GATEPOS[i];\n    const pn=pointAndNormal(gatePos);\n    const ang=Math.atan2(pn.ny,pn.nx)*180/Math.PI; // normal angle (across pipe)\n    const g=document.createElementNS('http://www.w3.org/2000/svg','g');\n    g.setAttribute('class','gate');\n    g.setAttribute('data-gate',i);\n    g.dataset.ang=ang;\n    // outer transform aligns the gate across the pipe at its position\n    g.setAttribute('transform',`translate(${pn.x.toFixed(1)},${pn.y.toFixed(1)}) rotate(${ang.toFixed(1)})`);\n    g.innerHTML=gateBarSVG();\n    g.addEventListener('click',e=>{e.stopPropagation();toggleGate(i);});\n    gatesG.appendChild(g);\n    gateEls.push(g);\n    applyGateState(i); // initial (closed)\n  });\n}\nfunction applyGateState(i){\n  const g=gateEls[i];\n  const bar=g.querySelector('.gate-bar');\n  const open=released[i];\n  // closed: bar ACROSS the pipe (blocking) ; open: bar rotates to lie ALONG the flow\n  bar.style.transform = open ? 'rotate(0deg)' : 'rotate(90deg)';\n  bar.querySelector('.bar-plate').setAttribute('fill', open ? '#cfe6d8' : 'url(#gFlange)');\n  bar.querySelector('.bar-plate').setAttribute('stroke', open ? '#3f9d68' : '#7f9485');\n}\nfunction releaseGate(i){\n  released[i]=true; applyGateState(i);\n  updateFlowTag(); select(i);\n}\nfunction toggleGate(i){\n  if(released[i]) resetGate(i); else releaseGate(i);\n}\nfunction resetGate(i){\n  released[i]=false; applyGateState(i);\n  updateFlowTag();\n  if(current===i) select(i);\n}\nfunction updateFlowTag(){\n  const open=released.filter(Boolean).length;\n  const tag=document.querySelector('.flow-tag');\n  if(open===5){ tag.innerHTML='Flujo liberado al 100%'; tag.style.color='#1f8a4c'; }\n  else if(open===0){ tag.innerHTML='Marketing &rarr; Ganancias'; tag.style.color=''; }\n  else { tag.innerHTML=`${open}/5 segmentos liberados`; tag.style.color=''; }\n}\nfunction resetAll(){\n  for(let i=0;i<ZONES.length;i++) resetGate(i);\n  updateFlowTag();\n  select(current);\n}\nbuildGates();\n\n/* ---- DUAL INTAKE VALVES: Ads + Organico ---- */\nconst intakeOpen={ads:true, org:true};\nconst ivalveEls={};\nfunction ivalveSVG(open){\n  return `\n    <circle r=\"14\" fill=\"#fff\" stroke=\"#0a3a20\" stroke-width=\"2.5\"/>\n    <g class=\"ihandle\" style=\"transform:rotate(${open?0:90}deg)\">\n      <rect x=\"-4.5\" y=\"-19\" width=\"9\" height=\"38\" rx=\"4\" fill=\"${open?'#1f8a4c':'#c33b3b'}\"/>\n    </g>\n    <circle r=\"4\" fill=\"#0a3a20\"/>`;\n}\nfunction renderIValve(src){ ivalveEls[src].innerHTML=ivalveSVG(intakeOpen[src]); }\nfunction updateIntakeUI(){\n  const f=(intakeOpen.ads?0.5:0)+(intakeOpen.org?0.5:0);\n  const tag=document.querySelector('.flow-tag');\n  if(tag){\n    if(f===0){ tag.innerHTML='Sin leads · entrada cerrada'; tag.style.color='#c33b3b'; }\n    else updateFlowTag();\n  }\n}\ndocument.querySelectorAll('#intake .ivalve').forEach(g=>{\n  const src=g.dataset.src; ivalveEls[src]=g; renderIValve(src);\n  g.style.cursor='pointer';\n  g.addEventListener('click',e=>{ e.stopPropagation(); intakeOpen[src]=!intakeOpen[src]; renderIValve(src); updateIntakeUI(); });\n});\n\n/* ---- INTAKE PRONG FLOW: dots flowing DOWN each prong, gated by its valve ---- */\nconst intakeDotsG=document.getElementById('intakeDots');\nconst adsFlowP=document.getElementById('adsFlow');\nconst orgFlowP=document.getElementById('orgFlow');\nconst adsFL=adsFlowP.getTotalLength();\nconst orgFL=orgFlowP.getTotalLength();\nfunction normAt(pathEl,t,Ltot){\n  const l=t*Ltot;\n  const a=pathEl.getPointAtLength(Math.max(0,l-1));\n  const c=pathEl.getPointAtLength(Math.min(Ltot,l+1));\n  const dx=c.x-a.x, dy=c.y-a.y, len=Math.hypot(dx,dy)||1;\n  return {x:(a.x+c.x)/2,y:(a.y+c.y)/2,nx:-dy/len,ny:dx/len};\n}\nconst intakeParticles=[];\nconst IN_N=26; // dots per prong\n['ads','org'].forEach(src=>{\n  for(let i=0;i<IN_N;i++){\n    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');\n    c.setAttribute('r',(2.4+Math.random()*2.4).toFixed(1));\n    c.setAttribute('fill', Math.random()<.5?'#cdebd8':'#8fd0a8');\n    c.setAttribute('class','flow-dot');\n    intakeDotsG.appendChild(c);\n    intakeParticles.push({el:c,src,t:Math.random(),v:0.7+Math.random()*0.6,\n      lat:(Math.random()*2-1),op0:0.5+Math.random()*0.4,vis:1});\n  }\n});\nlet inLast=performance.now();\nfunction intakeFrame(now){\n  const dt=Math.min(40,now-inLast); inLast=now;\n  const base=0.00010;\n  intakeParticles.forEach(p=>{\n    const open = (typeof intakeOpen!=='undefined') ? intakeOpen[p.src] : true;\n    // ease visibility with valve; when closed, flow in that prong stops & fades\n    p.vis += ((open?1:0)-p.vis)*Math.min(1,dt*0.005);\n    if(open){\n      p.t=(p.t+base*dt*p.v); if(p.t>=1) p.t-=1;\n    }\n    const Ltot = p.src==='ads'?adsFL:orgFL;\n    const pe = p.src==='ads'?adsFlowP:orgFlowP;\n    const pn=normAt(pe,p.t,Ltot);\n    const off=p.lat*0.8*PIPE_R;\n    p.el.setAttribute('cx',pn.x+pn.nx*off);\n    p.el.setAttribute('cy',pn.y+pn.ny*off);\n    p.el.setAttribute('opacity',(p.op0*p.vis).toFixed(3));\n  });\n  requestAnimationFrame(intakeFrame);\n}\nif(!window.matchMedia('(prefers-reduced-motion: reduce)').matches) requestAnimationFrame(intakeFrame);\n\nconst segs=[...document.querySelectorAll('.seg')];\nconst segLabels=[...document.querySelectorAll('.seg-label')];\nconst navEl=document.getElementById('nav');\nlet current=0;\nlet unitFilter='Todos';\n\nSTAGES.forEach((s,i)=>{\n  const b=document.createElement('button');\n  b.innerHTML=`<span class=\"nd\" style=\"background:${s.color}\"></span>${s.name}`;\n  b.onclick=()=>select(i);\n  navEl.appendChild(b);\n});\n\nfunction shade(hex,p){const n=parseInt(hex.slice(1),16);let r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}\nconst tick=`<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4L19 7\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>`;\n\nfunction execBlock(s){\n  // show % for the active filter; if Todos, show both compact\n  if(unitFilter==='Veranito' || unitFilter==='Kinder'){\n    const pct=EXEC[unitFilter];\n    return `<div class=\"exec\">\n       <div class=\"lbl\">Ejecucion · ${unitFilter}</div>\n       <div class=\"big\">${pct}%</div>\n       <div class=\"bar\"><i style=\"width:${ o</div>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--c-pending)\"></div> Por entregar</div>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--c-empty)\"></div> Sin actividad</div>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"box-shadow:0 0 0 1.5px var(--verde-claro)\"></div> Mes actual (Jun)</div>\n  </div>\n\n  <div class=\"eyebrow\">Línea de tiempo</div>\n  <h2>Hoja de Ruta por Entregables</h2>\n  <div class=\"h2-sub\">Haz clic en un mes para ver solo sus entregables. Haz clic en <b>2026</b> para ver todos.</div>\n\n  <div class=\"timeline-bar\">\n    <div class=\"tl-left\">\n      <div class=\"tl-label\">Tiempos</div>\n      <div class=\"year-box active\" id=\"yearBox\" onclick=\"clearFilter()\">2026</div>\n    </div>\n    <div class=\"month-row\" id=\"monthRow\"><div class=\"month\">Feb</div><div class=\"month\">Mar</div><div class=\"month\">Abr</div><div class=\"month\">May</div><div class=\"month current\">Jun &bull;</div><div class=\"month\">Jul</div><div class=\"month\">Ago</div><div class=\"month\">Sep</div><div class=\"month\">Oct</div></div>\n  </div>\n  <div class=\"filter-note\" id=\"filterNote\"></div>\n\n  <div id=\"projects\"></div>\n\n  <hr class=\"divider\">\n  <div class=\"footer-note\">\n    <b>Modelo de cálculo:</b> cada proyecto pondera 25% del total del cliente. El avance de cada proyecto = (entregables completados ÷ total de entregables) × 25%.<br>\n    <b>Fuente:</b> Lista de entregables Vida en Arte &middot; Actio Growth &middot; Corte: Junio 25, 2026. Entregables hasta junio: completados. Julio en adelante: por entregar.\n  </div>\n</main>\n\n<script>\nconst DATA = {\"kinder\": [{\"name\": \"Modelo de Negocio\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"Mecanismo / sistema modular de rotación\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"Definición de quiénes somos\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"¿A quién ayudamos?\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"Oferta comercial\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"Sistema operativo\", \"month\": \"Mar\", \"status\": \"done\", \"midx\": 1}, {\"name\": \"Stack de servicio\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Sesión de cierre — VEA\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Estrategia de precios\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Estructura del pitch de ventas\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Guía para tomar testimonios\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Estrategia de oferta comercial\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Aplicación VEA Kids\", \"month\": \"15 Jul\", \"status\": \"pending\", \"midx\": 5}, {\"name\": \"Estrategia captación de clientes (Ads, VSL, Landing)\", \"month\": \"10 Ago\", \"status\": \"pending\", \"midx\": 6}, {\"name\": \"Estrategia de ventas\", \"month\": \"10 Ago\", \"status\": \"pending\", \"midx\": 6}, {\"name\": \"Arquitectura / Gerencia Comercial\", \"month\": \"17 Ago\", \"status\": \"pending\", \"midx\": 6}], \"veranito\": [{\"name\": \"Estrategia de precio\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Estrategia de ventas\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Estrategia captación de clientes\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Creación y optimización de Ads Lanzamiento\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Creación y optimización Ads Evergreen\", \"month\": \"Jun\", \"status\": \"done\", \"midx\": 4}, {\"name\": \"Diseño de formulario de captación de leads\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Diseño de landing page\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Copy estratégico de landing page\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Creación y optimización de VSL\", \"month\": \"Abr\", \"status\": \"done\", \"midx\": 2}, {\"name\": \"Configuración y capacitación de uso GHL\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}, {\"name\": \"Diseño e implementación de página de inscripción\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}, {\"name\": \"Gestión y configuración de pasarela de pago\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}, {\"name\": \"Diseño y capacitación para equipo comercial\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}, {\"name\": \"Diseño, estrategia, config. y optimización de campaña en Meta\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}, {\"name\": \"Gestión y seguimiento de estrategia de captación y ventas\", \"month\": \"May\", \"status\": \"done\", \"midx\": 3}], \"after\": [], \"cumple\": [], \"months\": [\"Feb\", \"Mar\", \"Abr\", \"May\", \"Jun\", \"Jul\", \"Ago\", \"Sep\", \"Oct\"]};\n// Map month abbreviations to full for date formatting\nconst MONTH_FULL = {Feb:'febrero',Mar:'marzo',Abr:'abril',May:'mayo',Jun:'junio',Jul:'julio',Ago:'agosto',Sep:'septiembre',Oct:'octubre'};\nfunction fmtDate(label){\n  // If label has a day number like \"15 Jul\" -> \"15 de julio 2026\"\n  const parts = label.split(' ');\n  if(parts.length===2){\n    const day=parts[0], mon=parts[1];\n    return `${day} ${mon} 2026`;\n  }\n  return `${label} 2026`;\n}\nconst PROJECTS = [\n  {key:\"kinder\", name:\"Kinder\", pct:75, zero:false},\n  {key:\"veranito\", name:\"Veranito\", pct:100, zero:false},\n  {key:\"after\", name:\"After School\", pct:0, zero:true},\n  {key:\"cumple\", name:\"Cumpleaños\", pct:0, zero:true},\n];\nlet selectedMonth = null; // null = show all\nlet openState = {kinder:true, veranito:false, after:false, cumple:false};\n\nfunction ganttCells(key){\n  const tasks = DATA[key];\n  let doneM=new Set(), pendM=new Set();\n  tasks.forEach(t=>{ (t.status==='done'?doneM:pendM).add(t.midx); });\n  // after/cumple: mark sep(7) pending\n  if(key==='after'||key==='cumple'){ pendM.add(7); }\n  let html='';\n  for(let i=0;i<9;i++){\n    let cls='fill-empty';\n    if(doneM.has(i)) cls='fill-done';\n    else if(pendM.has(i)) cls='fill-pending';\n    let cur = i===4 ? ' current-month':'';\n    let sel = (selectedMonth!==null && i===selectedMonth) ? ' col-selected':'';\n    html+=`<div class=\"gantt-cell ${cls}${cur}${sel}\"></div>`;\n  }\n  return html;\n}\n\nfunction taskListHTML(key){\n  const proj = PROJECTS.find(p=>p.key===key);\n  let tasks = DATA[key].slice();\n  // zero projects (after/cumple)\n  if(proj.zero){\n    if(selectedMonth!==null && selectedMonth!==7){\n      return `<div class=\"task-group tg-pend\"><div class=\"task-group-title\">Por entregar</div><div class=\"empty-note\">Sin entregables en este mes.</div></div>`;\n    }\n    return `<div class=\"task-group tg-pend\"><div class=\"task-group-title\">Por entregar</div><div class=\"empty-note\">Proyecto pendiente de inicio.</div><div class=\"empty-sub\">Entrega prevista: 15 de septiembre de 2026.</div></div>`;\n  }\n  if(selectedMonth!==null){\n    tasks = tasks.filter(t=>t.midx===selectedMonth);\n    if(tasks.length===0){\n      return `<div class=\"task-group\"><div class=\"empty-note\">Sin entregables en este mes.</div></div>`;\n    }\n  }\n  const done = tasks.filter(t=>t.status==='done');\n  const pend = tasks.filter(t=>t.status==='pending');\n  let html='';\n  if(done.length){\n    html+=`<div class=\"task-group tg-done\"><div class=\"task-group-title\">Entregados</div>`;\n    done.forEach(t=>{ html+=`<div class=\"task-item\"><div class=\"task-dot dot-done\"></div><div class=\"task-item-name\">${t.name}</div><div class=\"task-date\">${fmtDate(t.month)}</div><div class=\"task-badge badge-done\">Entregado</div></div>`; });\n    html+=`</div>`;\n  }\n  if(pend.length){\n    html+=`<div class=\"task-group tg-pend\"><div class=\"task-group-title\">Por entregar</div>`;\n    pend.forEach(t=>{ html+=`<div class=\"task-item\"><div class=\"task-dot dot-pend\"></div><div class=\"task-item-name\">${t.name}</div><div class=\"task-date\">${fmtDate(t.month)}</div><div class=\"task-badge badge-pend\">Por entregar</div></div>`; });\n    html+=`</div>`;\n  }\n  return html;\n}\n\nfunction render(){\n  const cont = document.getElementById('projects');\n  cont.innerHTML = PROJECTS.map(p=>{\n    const open = openState[p.key] ? ' open':'';\n    const toggle = openState[p.key] ? '&#9662;':'&#9656;';\n    const pctColor = p.zero ? 'color:var(--texto-sec)':'';\n    return `<div class=\"project-row${open}\" id=\"row-${p.key}\">\n      <div class=\"project-header\" onclick=\"toggleRow('${p.key}')\">\n        <div class=\"project-info\"><div class=\"project-toggle\">${toggle}</div><div class=\"project-name\">${p.name}</div><div class=\"project-pct\" style=\"${pctColor}\">${p.pct}%</div></div>\n        <div class=\"gantt-area\">${ganttCells(p.key)}</div>\n      </div>\n      <div class=\"task-list\">${taskListHTML(p.key)}</div>\n    </div>`;\n  }).join('');\n}\n\nfunction toggleRow(key){\n  openState[key] = !openState[key];\n  render();\n}\n\nfunction selectMonth(idx){\n  selectedMonth = idx;\n  // open all projects when filtering\n  openState = {kinder:true, veranito:true, after:true, cumple:true};\n  // UI\n  document.querySelectorAll('.month').forEach((el,i)=>{ el.classList.toggle('selected', i===idx); });\n  document.getElementById('yearBox').classList.remove('active');\n  const note = document.getElementById('filterNote');\n  note.innerHTML = `Mostrando entregables de <b>${DATA.months[idx]} 2026</b>. Haz clic en 2026 para ver todos.`;\n  render();\n}\n\nfunction clearFilter(){\n  selectedMonth = null;\n  openState = {kinder:true, veranito:false, after:false, cumple:false};\n  document.querySelectorAll('.month').forEach(el=>el.classList.remove('selected'));\n  document.getElementById('yearBox').classList.add('active');\n  document.getElementById('filterNote').innerHTML='';\n  render();\n}\n\n// wire month clicks\ndocument.querySelectorAll('#monthRow .month').forEach((el,i)=>{\n  el.addEventListener('click', ()=>selectMonth(i));\n});\n\nrender();\n<\/script>\n<script>\n  document.querySelectorAll('.pagenav .pagepill').forEach(p=>{\n    p.addEventListener('click',()=>{\n      const v=p.dataset.view;\n      if(window.parent && window.parent!==window){ window.parent.postMessage({navTo:v},'*'); }\n    });\n  });\n<\/script>\n</body>\n</html>", "dash": "<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Dashboard de Atención Directa · Vida en Arte</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js\"><\/script>\n<style>\n  :root{\n    --green-900:#004225;\n    --green-600:#355E3B;\n    --green-400:#4C6B47;\n    --bg:#F4F6F4;\n    --card:#FFFFFF;\n    --ink:#1d2a22;\n    --muted:#6b7d72;\n    --line:#E3E9E4;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{\n    font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;\n    background:var(--bg);color:var(--ink);\n    padding:32px 28px 56px;\n  }\n  .wrap{max-width:1180px;margin:0 auto}\n  .pagenav{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 4px}\n  .pagepill{font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;color:var(--green-600);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 18px;transition:.15s;white-space:nowrap}\n  .pagepill:hover{background:#eef3ee;transform:translateY(-1px)}\n  .pagepill.active{background:var(--green-900);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,66,37,.18)}\n\n  header{\n    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;\n    padding:4px 2px 0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;\n  }\n  .brand{display:flex;align-items:center;gap:18px}\n  .logo-chip{background:transparent;display:flex;align-items:center}\n  .logo-chip img{height:42px;display:block}\n  .uh-eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:700}\n  header h1{font-size:26px;font-weight:800;color:var(--green-900);letter-spacing:.2px;line-height:1.1;margin-top:3px}\n  header p{color:var(--muted);font-size:13.5px;margin-top:4px;font-weight:400;max-width:560px}\n  .tag{\n    background:#fff;border:1px solid var(--line);color:var(--green-900);\n    padding:8px 16px;border-radius:999px;font-size:12.5px;font-weight:700;\n    display:flex;align-items:center;gap:9px;white-space:nowrap;\n  }\n  .tag::before{content:\"\";width:9px;height:9px;border-radius:50%;background:var(--green-900);box-shadow:0 0 0 4px rgba(0,66,37,.15)}\n\n  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}\n  .kpi{\n    background:var(--card);border-radius:14px;padding:20px 22px;\n    border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.03);\n    position:relative;overflow:hidden;\n  }\n  .kpi::before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green-600)}\n  .kpi.alt::before{background:var(--green-900)}\n  .kpi.alt2::before{background:var(--green-400)}\n  .kpi .label{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}\n  .kpi .value{font-size:32px;font-weight:800;color:var(--green-900);margin-top:8px;line-height:1}\n  .kpi .sub{font-size:12.5px;color:var(--muted);margin-top:7px}\n\n  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}\n  .card{\n    background:var(--card);border-radius:16px;padding:22px 24px 16px;\n    border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.035);\n  }\n  .card h2{font-size:15px;font-weight:700;color:var(--green-900);margin-bottom:4px}\n  .card .hint{font-size:12.5px;color:var(--muted);margin-bottom:16px}\n  .card.full{grid-column:1 / -1}\n  .chart-box{position:relative;height:260px}\n  .chart-box.tall{height:300px}\n\n  .split{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;margin-top:22px}\n\n  .legend-inline{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px}\n  .legend-inline span{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}\n  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}\n\n  footer{margin-top:30px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}\n  .badge-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}\n  .mini{\n    background:#EFF3EF;border:1px solid var(--line);border-radius:10px;\n    padding:11px 15px;font-size:12.5px;color:var(--green-900);font-weight:600;\n  }\n  .mini b{color:var(--green-600)}\n  @media(max-width:880px){\n    .kpis{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.split{grid-template-columns:1fr}\n  }\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n\n  <header>\n    <div class=\"brand\">\n      <div class=\"logo-chip\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAPwAAAB4CAYAAADWip+pAABv0ElEQVR4nO1dd3wU1dp+3nNmdjeVJIRA6L2LQrBhSaLYFQvu2q89sffv2t1d29Vr12sh9opm7YqKoiSCNAlVQg+9JIT0srszc97vj9lAAgmEcilenh/DQjI7c+bMKW99XuAQDmH/ggDApTlw68dv3Hvi/11erp83VOHEzopO66dG3OFRt3/8ylvM3AkAvF6v2L/NPYRDOITdhtfrFcysZb3ifyv10mMZRycrnNiZkdGVkd6FcXRbK3bUIL7i+QfmMnNibm6uZGba3+0+hEM4hF1E2pgsnYhwz5fv3djhyhMYRyYG5Uk9GBnd7Amf0ZXFyT0Yx6YExdn9+ch7r7wbAJCeru3nph+0OCQeHcL+AhVk55hKKf3PP/Pv3bhkkZJxCbqlLAC85SRlWSBXtK4qKq3SDWtuX7hpU0dk5KtDu/zu4dBKeQj7EzwcBZi7aF40OV3CUopbOE3AsixLUpd38sf1gx/rPYMCEoC1T1v7N8ChCX8I+xUF2dlAZZkBIYCW5jsASImy2mr+YfFfYQAIBAL7qol/K/wtRXpmJk3IVp1LACT9LbvhoMDMMTOR3LF7NAwDRC1L6WRZSI1LoNuPO1kAgNvt3mdt/Dvhb7fDp2Vl6URkPPTR6/967rOX3fWVVSZINv+cbJnONm2040acNmbCfc8/m+HLkPn+fHMfN/mAADOL9tecOqlk+YL2JHTFzE1WQSICGyEV26mr6Dds5KUF9z05w53rl 2.5\n  }]},\n  options:{plugins:{legend:{display:false}},\n    scales:{x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:9}},\n      y:{beginAtZero:true,grid:{color:C.line},ticks:{stepSize:2}}}}\n});\n\n// call duration horizontal bars\nnew Chart(document.getElementById('buckets'),{\n  type:'bar',\n  data:{labels:bkL,datasets:[{\n    label:'Llamadas',data:bkV,\n    backgroundColor:[C.g400,C.g900,C.g600,C.g400,C.g600],borderRadius:5,maxBarThickness:30\n  }]},\n  options:{indexAxis:'y',plugins:{legend:{display:false},\n    tooltip:{callbacks:{label:c=>` ${c.raw} llamadas`}}},\n    scales:{x:{beginAtZero:true,grid:{color:C.line},ticks:{stepSize:2}},y:{grid:{display:false}}}}\n});\n<\/script>\n<script>\n  document.querySelectorAll('.pagenav .pagepill').forEach(p=>{\n    p.addEventListener('click',()=>{\n      const v=p.dataset.view;\n      if(window.parent && window.parent!==window){ window.parent.postMessage({navTo:v},'*'); }\n    });\n  });\n<\/script>\n</body>\n</html>\n"};
